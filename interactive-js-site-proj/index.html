<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TFT Team Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="bg-header" class="mask">
		<img src="bg-images/bg-header.jpg" alt="TFT Set 17 Promotional Artwork">
	</div>

	<header><h1>Set 17: Team Planner</h1></header>
	
	<!--Drag Container for Champ Icons-->
	<div id="champ-header"> <h4>(Drag champions from here into the team grid to start your team.)</h4> </div>
	<div id="champ-select" class="drag-box1">
		<img src="champs/england.png" alt="TFT Champ" id="champ1" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ2" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ3" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ4" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ5" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ6" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ7" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ8" draggable="true" ondragstart="dragstartHandler(event)">
		<img src="champs/england.png" alt="TFT Champ" id="champ9" draggable="true" ondragstart="dragstartHandler(event)">
	</div> 

	<!--Drop Container for Champ and Item Icons-->
	<div id="team-header"> <h2>Team Grid</h2> </div>
	<section id="team-grid" class="drop-box">
		<div id="slot1" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot2" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot3" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot4" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot5" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot6" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot7" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot8" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot9" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot10" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot11" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot12" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot13" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot14" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot15" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot16" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot17" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot18" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot19" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot20" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot21" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot22" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot23" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot24" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
		<div id="slot25" class="teamslot" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
	</section>

	<!--Appears later in HTML to maintain proper stacking order.-->
	<div id="team-traits"><h3>(Team Traits Appear Here)</h3></div>

	<!--Drag Container for Item Icons-->
	<div id="item-header"><h4>(Drag items from here into the team grid to itemize your team.)</h4></div>
	<div id="item-select" class="drag-box2">
		<img src="items/england.png" alt="TFT Item" id="item1">
		<img src="items/england.png" alt="TFT Item" id="item2">
		<img src="items/england.png" alt="TFT Item" id="item3">
		<img src="items/england.png" alt="TFT Item" id="item4">
		<img src="items/england.png" alt="TFT Item" id="item5">
		<img src="items/england.png" alt="TFT Item" id="item6">
		<img src="items/england.png" alt="TFT Item" id="item7">
		<img src="items/england.png" alt="TFT Item" id="item8">
		<img src="items/england.png" alt="TFT Item" id="item9">
	</div>

	<footer> 

		<a href="recipes.html">
			<button><h2>Check Out Our Item Crafting Guide -></h2></button>
		</a>
		 
	</footer>

	<div id="bg-footer" class="mask">
		<img src="bg-images/bg-footer.jpg" alt="TFT Set 17 Promotional Artwork">
	</div>


	<script src="main.js"></script>
</body>
</html>
